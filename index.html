<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Payment Track 2.0</title>
<meta name="description" content="The new way to spend." />
<meta name="theme-color" content="#f5f0e8" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-title" content="Payment Track" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=IM+Fell+English+SC&display=swap" />

<style>
  :root{
    --paper:#f5f0e8;
    --paper-2:#ece5d6;
    --paper-edge:#d9cdb1;
    --ink:#1a1208;
    --ink-soft:#3d2d1b;
    --olive:#6b6b3a;
    --olive-soft:#8e8e5a;
    --accent:#8b2500;
    --accent-soft:#a44a26;
    --rule:rgba(26,18,8,.55);
    --rule-soft:rgba(26,18,8,.22);
    --table:#2b2218;
    --serif:"Libre Baskerville","Iowan Old Style",Georgia,serif;
    --display:"IM Fell English SC","Libre Baskerville",Georgia,serif;
    --mono:"Special Elite","Courier Prime",ui-monospace,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--serif);
    color:var(--ink);
    background:var(--table);
    background-image:
      radial-gradient(ellipse at 30% 20%,rgba(255,235,200,.05),transparent 60%),
      radial-gradient(ellipse at 70% 80%,rgba(0,0,0,.4),transparent 70%),
      repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0 2px,transparent 2px 6px),
      linear-gradient(180deg,#2b2218 0%,#1a130b 100%);
    overflow:hidden;
  }
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:stretch;justify-content:center;
    overflow:hidden;
  }
  .page{
    position:relative;width:100%;max-width:430px;
    height:100%;max-height:100dvh;
    background:var(--paper);color:var(--ink);
    overflow:hidden;isolation:isolate;
    box-shadow:0 0 0 1px rgba(0,0,0,.4),0 20px 60px rgba(0,0,0,.55),0 4px 12px rgba(0,0,0,.3),inset 0 0 80px rgba(120,80,30,.06);
  }
  .page::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
    background-image:
      repeating-linear-gradient(101deg,rgba(120,80,30,0) 0 14px,rgba(120,80,30,.025) 14px 15px,rgba(120,80,30,0) 15px 32px),
      repeating-linear-gradient(-78deg,rgba(120,80,30,0) 0 17px,rgba(80,50,15,.02) 17px 18px,rgba(120,80,30,0) 18px 28px),
      radial-gradient(circle at 20% 12%,rgba(140,70,20,.04),transparent 8%),
      radial-gradient(circle at 80% 30%,rgba(140,70,20,.035),transparent 9%),
      radial-gradient(circle at 35% 60%,rgba(140,70,20,.03),transparent 7%),
      radial-gradient(circle at 88% 78%,rgba(140,70,20,.045),transparent 10%),
      radial-gradient(circle at 15% 88%,rgba(140,70,20,.035),transparent 8%);
    mix-blend-mode:multiply;
    opacity:var(--grain,1);
  }
  .page::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:2;
    background:
      linear-gradient(180deg,rgba(80,50,15,.18) 0%,transparent 6%,transparent 94%,rgba(80,50,15,.16) 100%),
      linear-gradient(90deg,rgba(80,50,15,.14) 0%,transparent 5%,transparent 95%,rgba(80,50,15,.14) 100%);
  }
  #root{position:relative;z-index:3;height:100%;display:flex;flex-direction:column}
  .scroll{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .scroll::-webkit-scrollbar{display:none}
  h1,h2,h3,h4{margin:0;font-family:var(--display);font-weight:400;letter-spacing:.02em}
  p{margin:0}
  button{font-family:inherit;color:inherit}
  input,select,textarea{font-family:inherit;color:inherit}
  .mono{font-family:var(--mono);font-feature-settings:"tnum";letter-spacing:0}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  ::selection{background:rgba(139,37,0,.25);color:var(--ink)}
  .rule{
    height:1px;background:var(--rule-soft);
    background-image:linear-gradient(90deg,transparent 0 3px,var(--rule-soft) 3px 100%);
    mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 1' preserveAspectRatio='none'><path d='M0 .55 C 25 .25, 50 .85, 75 .35 S 100 .75 100 .5' stroke='black' fill='none'/></svg>");
    mask-size:100% 100%;
    -webkit-mask-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 1' preserveAspectRatio='none'><path d='M0 .55 C 25 .25, 50 .85, 75 .35 S 100 .75 100 .5' stroke='black' fill='none'/></svg>");
    -webkit-mask-size:100% 100%;
  }
  .rule-strong{background:var(--rule)}
  body[data-tone="carbon"]{
    --paper:#1c1814;--paper-2:#252019;--paper-edge:#332b1f;
    --ink:#e8dcc4;--ink-soft:#c9b48a;--olive:#a8a677;--olive-soft:#8a8862;
    --accent:#e07b3f;--accent-soft:#c46a30;
    --rule:rgba(232,220,196,.55);--rule-soft:rgba(232,220,196,.22);
    --table:#0c0907;
  }
  body[data-tone="carbon"] .page::before{
    background-image:
      repeating-linear-gradient(101deg,rgba(255,220,170,0) 0 14px,rgba(255,220,170,.025) 14px 15px,rgba(255,220,170,0) 15px 32px),
      repeating-linear-gradient(-78deg,rgba(255,220,170,0) 0 17px,rgba(255,220,170,.02) 17px 18px,rgba(255,220,170,0) 18px 28px),
      radial-gradient(circle at 20% 12%,rgba(255,200,140,.04),transparent 8%),
      radial-gradient(circle at 80% 30%,rgba(255,200,140,.035),transparent 9%),
      radial-gradient(circle at 35% 60%,rgba(255,200,140,.03),transparent 7%),
      radial-gradient(circle at 88% 78%,rgba(255,200,140,.045),transparent 10%);
    mix-blend-mode:screen;
  }
  @media (min-width: 480px){
    .page{border-left:1px solid rgba(0,0,0,.25);border-right:1px solid rgba(0,0,0,.25);}
  }
</style>
</head>
<body>
<div id="stage">
  <div class="page" id="page">
    <div id="root"></div>
  </div>
</div>

<script type="text/babel" src="src/tweaks-panel.jsx"></script>
